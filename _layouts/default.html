<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1526" />
  <meta name="site-revision" content="{{ site.github.build_revision }}"/>

  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml" />
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any" />
  <link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
</head>
<body>
  {{ content }}
  <script>
    var y = document.getElementById('year');
    if (y) y.textContent = new Date().getFullYear();
  </script>
</body>
</html>
